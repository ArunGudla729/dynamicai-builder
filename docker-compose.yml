version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dynamicai-postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: dynamicai
      POSTGRES_PASSWORD: dynamicai_password
      POSTGRES_DB: dynamicai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dynamicai']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dynamicai-app
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://dynamicai:dynamicai_password@postgres:5432/dynamicai?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./.env.local:/app/.env.local

volumes:
  postgres_data:
